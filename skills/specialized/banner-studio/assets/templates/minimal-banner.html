<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=1.0">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1200px;
    height: 675px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #0F0F1A;
    color: #FFFFFF;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .banner {
    width: 1200px;
    height: 675px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 80px;
    position: relative;
    overflow: hidden;
  }

  .banner::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(
      ellipse at center,
      {{accent_color}}15 0%,
      transparent 60%
    );
    pointer-events: none;
  }

  .accent-bar {
    width: 80px;
    height: 4px;
    background: {{accent_color}};
    border-radius: 2px;
    margin-bottom: 40px;
  }

  .title {
    font-size: 64px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }

  .subtitle {
    font-size: 28px;
    font-weight: 400;
    color: #A0A0B0;
    line-height: 1.4;
    max-width: 800px;
    position: relative;
    z-index: 1;
  }

  .corner-accent {
    position: absolute;
    width: 120px;
    height: 120px;
    border: 2px solid {{accent_color}}30;
    pointer-events: none;
  }

  .corner-accent.top-left {
    top: 30px;
    left: 30px;
    border-right: none;
    border-bottom: none;
  }

  .corner-accent.bottom-right {
    bottom: 30px;
    right: 30px;
    border-left: none;
    border-top: none;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="corner-accent top-left"></div>
    <div class="corner-accent bottom-right"></div>
    <div class="accent-bar"></div>
    <h1 class="title">{{title}}</h1>
    <p class="subtitle">{{subtitle}}</p>
  </div>
</body>
</html>
